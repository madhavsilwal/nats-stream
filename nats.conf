server_name: nats-jetstream-1
host: "0.0.0.0"
port: 4222

operator: "/etc/nats/creds/operator.jwt"

resolver: {
  type:         full
  dir:          "/etc/nats/creds/resolver"
  allow_delete: false
  interval:     "2m"
}

jetstream {
  store_dir:        "/data/jetstream"
  max_memory_store: 1GB
  max_file_store:   10GB
}

http_port: 8222
logtime:   true